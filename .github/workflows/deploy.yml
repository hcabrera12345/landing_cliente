name: Deploy to Hostinger via LFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Project (Vite)
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Show remote directory structure (debug)
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow yes
          set ftp:passive-mode yes
          set ssl:verify-certificate no
          set net:timeout 30
          ls -la
          ls -la domains/ || echo "no domains folder at root"
          bye
          EOF

      - name: Deploy to Hostinger via LFTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ftp:ssl-allow yes
          set ftp:passive-mode yes
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          mirror --reverse --delete --verbose dist/ domains/nixagapetrol.com/public_html/
          bye
          EOF
